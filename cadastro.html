<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>
<body>

<div class="container">

    <div class="card">

        <h1>Cadastrar Professor</h1>

        <input
            type="text"
            id="nome"
            placeholder="Nome"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="senha"
            placeholder="Senha"
            required
        >

        <button onclick="cadastrar()">
            Cadastrar
        </button>

        <button onclick="window.location.href='index.html'">
            Voltar
        </button>

    </div>

</div>

<div class="loading-overlay" id="loading">

    <div class="loading-spinner"></div>

</div>

<script src="js/loading.js"></script>

<script type="module" src="js/auth.js"></script>

</body>
</html>
