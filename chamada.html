<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icons/icon-192.png">
    <title>Chamada</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container coluna">

    <div class="card">

        <h1>Lista de Chamada</h1>

        <div class="coletes-botoes">

            <button
                class="btn-colete btn-amarelo"
                onclick="selecionarColete('Amarelo')"
                type="button"
            >
                Amarelo
            </button>

            <button
                class="btn-colete btn-azul"
                onclick="selecionarColete('Azul')"
                type="button"
            >
                Azul
            </button>

            <button
                class="btn-colete btn-verde"
                onclick="selecionarColete('Verde')"
                type="button"
            >
                Verde
            </button>

        </div>

        <input
            type="hidden"
            id="colete"
        >

        <div class="acoes">

            <button onclick="carregarAlunos()">
                Carregar Colete
            </button>

            <button onclick="salvarChamada()">
                Salvar Chamada
            </button>

            <button onclick="window.location.href='dashboard.html'">
                Voltar
            </button>

        </div>

    </div>

    <div class="card lista-card">

        <h2 id="titulo-colete">
            Alunos do Colete
        </h2>

        <div id="lista-alunos-colete"></div>

    </div>

</div>

<div class="loading-overlay" id="loading">

    <div class="loading-spinner"></div>

</div>

<script src="js/loading.js?v=4"></script>

<script type="module" src="js/chamada.js?v=4"></script>

</body>
</html>
