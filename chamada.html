<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamada</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container coluna">

    <div class="card">

        <h1>Lista de Chamada</h1>

        <input type="text" id="colete" placeholder="Colete">

        <div class="acoes">

            <button onclick="carregarAlunos()">
                Carregar Colete
            </button>

            <button onclick="salvarChamada()">
                Salvar Chamada
            </button>

            <button onclick="window.location.href='dashboard.html'">
                Voltar
            </button>

        </div>

    </div>

    <div class="card lista-card">

        <h2>Alunos do Colete</h2>

        <div id="lista-alunos-colete"></div>

    </div>

</div>

<div class="loading-overlay" id="loading">

    <div class="loading-spinner"></div>

</div>

<script src="js/loading.js?v=4"></script>

<script type="module" src="js/chamada.js?v=4"></script>

</body>
</html>
