<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container coluna">

    <div class="card">

        <h1>Cadastro de Alunos</h1>

        <input type="text" id="nome" placeholder="Nome do aluno">

        <input type="text" id="turma" placeholder="Turma">

        <input type="text" id="colete" placeholder="Colete">

        <div class="acoes">

            <button onclick="cadastrarAluno()">
                Cadastrar
            </button>

            <button onclick="window.location.href='dashboard.html'">
                Voltar
            </button>

        </div>

    </div>

    <div class="card lista-card">

        <h2>Lista de Alunos</h2>

        <div id="lista-alunos"></div>

    </div>

</div>

<div class="loading-overlay" id="loading">

    <div class="loading-spinner"></div>

</div>

<script src="js/loading.js?v=2"></script>

<script type="module" src="js/alunos.js?v=2"></script>

</body>
</html>
