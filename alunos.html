<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container coluna">

    <div class="card">

        <h1>Cadastro de Alunos</h1>

        <input
            type="text"
            id="nome"
            placeholder="Nome do aluno"
            required
        >

        <input
            type="text"
            id="turma"
            placeholder="Turma"
            required
        >

        <div class="coletes-botoes">

            <button
                class="btn-colete btn-amarelo"
                onclick="selecionarColete('Amarelo')"
                type="button"
            >
                Amarelo
            </button>

            <button
                class="btn-colete btn-azul"
                onclick="selecionarColete('Azul')"
                type="button"
            >
                Azul
            </button>

            <button
                class="btn-colete btn-verde"
                onclick="selecionarColete('Verde')"
                type="button"
            >
                Verde
            </button>

        </div>

        <input
            type="hidden"
            id="colete"
            required
        >

        <div class="acoes">

            <button onclick="cadastrarAluno()">
                Cadastrar
            </button>

            <button onclick="window.location.href='dashboard.html'">
                Voltar
            </button>

        </div>

    </div>

    <div class="card lista-card">

        <h2>Lista do Colete Amarelo</h2>

        <div id="lista-amarelo"></div>

    </div>

    <div class="card lista-card">

        <h2>Lista do Colete Azul</h2>

        <div id="lista-azul"></div>

    </div>

    <div class="card lista-card">

        <h2>Lista do Colete Verde</h2>

        <div id="lista-verde"></div>

    </div>

</div>

<div class="loading-overlay" id="loading">

    <div class="loading-spinner"></div>

</div>

<script src="js/loading.js?v=2"></script>

<script type="module" src="js/alunos.js?v=2"></script>

</body>
</html>
